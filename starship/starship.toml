add_newline = false

format="""\
    $directory\
    $lua\
    $python\
    $nodejs\
    $golang\
    $rust\
    $terraform\
    $kubernetes\
    $git_branch\
    $git_status\
    $git_state\
    $jobs\
    $character\
"""

[directory]
  style = "bold #81a1c1"
  truncation_length = 3
  truncate_to_repo = true
  home_symbol = "~"
  read_only = "пҖЈ "
  format = "[($path )]($style)[$read_only]($read_only_style)"

[lua]
  symbol = "оҳ  "
  format ="[($symbol$version )]($style)"

[python]
  style = "yellow"
  symbol = "оҲө "
  format = '[($symbol${version}) (\($virtualenv\) )]($style)'
  python_binary = ["python3"]

[nodejs]
  symbol = "оңҳ "
  style = "green"
  format ="[($symbol$version )]($style)"

[rust]
  symbol = "оһЁ "
  format = "[($symbol$version )]($style)"

[golang]
  symbol = "оҳ§ "
  format = "[($symbol$version )]($style)"

[git_branch]
  style = "bold #5e81ac"
  format = "[($symbol$branch )]($style)"

[git_status]
  style = "bold #d08770"
  ahead = "п‘ҫ $count"
  diverged = "п‘ҫ${ahead_count}|п‘Ӣ${behind_count}"
  behind = "п‘Ӣ ${count}"

[git_state]
  format = "[($state( $progress_current of $progress_total ))]($style) "

[terraform]
  format = '[$symbol $workspace]($style) '
  symbol = 'уұҒў '

[kubernetes]
  format = '[$symbol ctx:$context|ns:$namespace]($style) '
  symbol = 'уұғҫ '
  disabled = false
  detect_files = ["Chart.yaml",]
  detect_env_vars = ["INVALID"]
  contexts = [
    { context_pattern = ".*dev-izi-cluster", style="green", context_alias = "dev"},
    { context_pattern = ".*staging-izi-cluster", style="yellow", context_alias = "staging"},
    { context_pattern = ".*prod-izi-cluster", style="red", context_alias = "prod"},
  ]

[character]
  success_symbol = "[вһң](green)"
  error_symbol = "[вң—](red)"
  vicmd_symbol = "[В«](cyan)"
